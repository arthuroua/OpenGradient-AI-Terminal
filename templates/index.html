<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Ecosystem Radar</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
margin:0;
}

.header{
text-align:center;
padding:40px;
}

.title{
font-size:36px;
color:#00f2ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#141a2b;
padding:20px;
border-radius:10px;
}

.card:hover{
background:#1c2338;
}

.likes{
margin-top:10px;
color:#00f2ff;
}

</style>

</head>

<body>

<div class="header">
<div class="title">
OpenGradient Ecosystem Radar
</div>
</div>

<div id="grid" class="grid"></div>

<script>

async function loadModels(){

try{

const res = await fetch("https://hub.opengradient.ai/models")

const html = await res.text()

const parser = new DOMParser()

const doc = parser.parseFromString(html,"text/html")

const nextData = doc.querySelector("#__NEXT_DATA__")

const json = JSON.parse(nextData.textContent)

const models = json.props.pageProps.initialModels || []

const grid = document.getElementById("grid")

models.slice(0,20).forEach(m=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<h3>${m.name}</h3>
<p>${m.description || "OpenGradient model"}</p>
<div class="likes">❤️ ${m.likes || 0}</div>
`

grid.appendChild(card)

})

}catch(e){

console.log("error loading models",e)

}

}

loadModels()

</script>

</body>

</html>
